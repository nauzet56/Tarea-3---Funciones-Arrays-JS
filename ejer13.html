<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Resolución del Ejercicio 13</h1>
    <p>Revisa la consola (F12) para ver la lista de salarios ordenada de mayor a menor.</p>

    <script>
        const empleados = [
            { nombre: "Ana",    salario: 2800 },
            { nombre: "Luis",   salario: 3500 },
            { nombre: "Marta",  salario: 2200 },
            { nombre: "Carlos", salario: 4100 },
        ];

        // Ordenamos por salario de mayor a menor (descendente)
        // Usamos b.salario - a.salario siguiendo la pista
        const ordenados = [...empleados].sort((a, b) => b.salario - a.salario);

        // Imprimimos el resultado formateado como pide el ejercicio
        console.log("Empleados ordenados por salario (descendente):");
        ordenados.forEach(e => console.log(e.nombre, "→", e.salario));

        // Tabla opcional para una vista más clara
        console.table(ordenados);
    </script>
</body>
</html>
